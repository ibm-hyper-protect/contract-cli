ShortDescription: CLI tool for managing IBM Confidential Computing contracts and configurations
Description: |-
  Contract CLI automates contract generation and management for IBM Confidential Computing services.
  It supports IBM Confidential Computing Container Runtime, IBM Confidential Computing Container Runtime
  for Red Hat Virtualization Solutions, and IBM Confidential Computing Containers for Red Hat OpenShift
  Container Platform. Features include contract signing, encryption, validation, certificate management,
  attestation record decryption, and image selection.
