# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.9.0.schema.json
PackageIdentifier: IBM.ContractCLI
PackageVersion: "${VERSION}"
InstallerLocale: en-US
InstallerType: zip
NestedInstallerType: portable
NestedInstallerFiles:
  - RelativeFilePath: contract-cli.exe
    PortableCommandAlias: contract-cli
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/ibm-hyper-protect/contract-cli/releases/download/v${VERSION}/contract-cli_${VERSION}_windows_amd64.zip
    InstallerSha256: "${SHA256_AMD64}"
  - Architecture: arm64
    InstallerUrl: https://github.com/ibm-hyper-protect/contract-cli/releases/download/v${VERSION}/contract-cli_${VERSION}_windows_arm64.zip
    InstallerSha256: "${SHA256_ARM64}"
ManifestType: installer
ManifestVersion: 1.9.0
